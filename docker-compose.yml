services:
  app:
    build:
      context: .
      dockerfile: Dockerfile_app
      args:
        SSH_USER: ${SSH_USER}
        SSH_PASSWORD: ${SSH_PASSWORD}
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_PORT}:5000"
      - "127.0.0.1:${APP_SSH_PORT}:22"
    volumes:
      - app_source:/app
    cpus: "${CPUS}"

  tester:
    build:
      context: .
      dockerfile: Dockerfile_tester
      args:
        SSH_USER: ${SSH_USER}
        SSH_PASSWORD: ${SSH_PASSWORD}
    env_file:
      - .env
    depends_on:
      - app
    ports:
      - "127.0.0.1:${TESTER_SSH_PORT}:22"
    volumes:
      - app_source:/app:ro
      - ./tester:/tester
    cpus: "${CPUS}"

volumes:
  app_source: