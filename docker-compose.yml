services:
  app:
    build:
      context: .
      dockerfile: Dockerfile_app
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_PORT}:5000"
      - "127.0.0.1:${APP_SSH_PORT}:22"
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"

  tester:
    build:
      context: .
      dockerfile: Dockerfile_tester
    env_file:
      - .env
    depends_on:
      - app
    ports:
      - "127.0.0.1:${TESTER_SSH_PORT}:22"